<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff8fab">
<title>Animal World</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #fef9ff;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
}
#app {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── Background ── */
#bg {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #fff0f8 0%, #f0f8ff 50%, #f5fff0 100%);
  z-index: 0; overflow: hidden;
  pointer-events: none;
}
.bg-shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.18;
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(0) rotate(0deg); }
  50%  { transform: translateY(-30px) rotate(180deg); }
  100% { transform: translateY(0) rotate(360deg); }
}

/* ── Screens ── */
#screens {
  position: relative; flex: 1;
  z-index: 1; overflow: hidden;
}
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
  will-change: transform, opacity;
}
.screen.left  { transform: translateX(-100%); opacity: 0; pointer-events: none; }
.screen.right { transform: translateX(100%);  opacity: 0; pointer-events: none; }
.screen.active{ transform: translateX(0);     opacity: 1; pointer-events: all; }

/* ── Nav ── */
#nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  gap: 18px; padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
}
.nav-arrow {
  width: 52px; height: 52px; border-radius: 50%;
  border: none; cursor: pointer;
  background: linear-gradient(135deg, #ffb3c6, #ff8fab);
  font-size: 22px; box-shadow: 0 3px 10px rgba(255,100,150,0.35);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.nav-arrow:active { transform: scale(0.88); }
.dots { display: flex; gap: 10px; }
.dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #ddd; transition: all 0.3s;
}
.dot.active { background: #ff8fab; transform: scale(1.4); }

/* ── Mute button ── */
#mute-btn {
  position: fixed; top: max(8px, env(safe-area-inset-top)); right: 8px;
  z-index: 999;
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.7); border: none; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  transition: transform 0.15s;
}
#mute-btn:active { transform: scale(0.85); }

/* ═══════════════════════════════════════════
   SCREEN 1 — ANIMAL POP
═══════════════════════════════════════════ */
#screen-animals {
  background: transparent;
}
#animal-stage {
  position: relative;
  width: 100%; flex: 1;
  display: flex; align-items: center; justify-content: center;
}
.animal-card {
  position: absolute;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  border-radius: 40px;
  padding: 20px 30px;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 8px 32px rgba(100,100,200,0.15);
  transition: opacity 0.5s, transform 0.5s;
  will-change: transform;
  animation: animalEntrance 0.5s cubic-bezier(.34,1.56,.64,1);
}
.animal-card .emoji {
  font-size: clamp(100px, 28vw, 160px);
  line-height: 1;
  display: block;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.12));
}
.animal-card .label {
  font-size: clamp(24px, 6vw, 38px);
  font-weight: 800;
  margin-top: 8px;
  background: linear-gradient(135deg, #ff6b9d, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
@keyframes animalEntrance {
  from { transform: scale(0.3) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes animalBounce {
  0%   { transform: scale(1) rotate(0deg); }
  20%  { transform: scale(1.3) rotate(-8deg); }
  40%  { transform: scale(0.9) rotate(6deg); }
  60%  { transform: scale(1.15) rotate(-4deg); }
  80%  { transform: scale(0.97) rotate(2deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.animal-card.bounce { animation: animalBounce 0.6s cubic-bezier(.34,1.56,.64,1); }

/* ═══════════════════════════════════════════
   SCREEN 2 — COLOR BUBBLES
═══════════════════════════════════════════ */
#screen-bubbles {
  overflow: hidden;
}
#bubble-stage {
  position: relative; width: 100%; flex: 1; overflow: hidden;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: inset -8px -8px 20px rgba(0,0,0,0.12), 0 4px 20px rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 0px;
  will-change: transform;
  animation: bubbleFloat ease-in-out infinite alternate;
  transition: transform 0.1s;
}
.bubble::before {
  content: '';
  position: absolute;
  top: 18%; left: 22%;
  width: 30%; height: 20%;
  background: rgba(255,255,255,0.55);
  border-radius: 50%;
  transform: rotate(-35deg);
}
@keyframes bubbleFloat {
  from { transform: translateY(0px) rotate(-3deg); }
  to   { transform: translateY(-22px) rotate(3deg); }
}
@keyframes bubblePop {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.5); opacity: 0.8; }
  70%  { transform: scale(1.8); opacity: 0.3; }
  100% { transform: scale(0.1); opacity: 0; }
}
.bubble.popping { animation: bubblePop 0.35s ease-out forwards; }

/* ═══════════════════════════════════════════
   SCREEN 3 — MUSIC TAP
═══════════════════════════════════════════ */
#screen-music {
  padding: 10px;
}
#music-title {
  font-size: clamp(18px, 5vw, 28px);
  font-weight: 800;
  color: #a78bfa;
  margin-bottom: 8px;
  text-shadow: 0 2px 8px rgba(167,139,250,0.3);
}
#shapes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: clamp(10px, 3vw, 18px);
  width: min(100%, 400px);
  padding: 0 10px;
  flex: 1;
  min-height: 0;
}
.shape-btn {
  width: 100%;
  aspect-ratio: 1;
  border: none; cursor: pointer;
  border-radius: 28px;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
  will-change: transform;
  padding: 0;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
  min-width: 0; min-height: 0;
}
.shape-btn svg {
  width: 100%; height: 100%; display: block;
}
.shape-btn:active { transform: scale(0.88); }
@keyframes shapeWiggle {
  0%   { transform: scale(1) rotate(0); }
  20%  { transform: scale(1.25) rotate(-10deg); }
  50%  { transform: scale(1.15) rotate(8deg); }
  75%  { transform: scale(1.05) rotate(-4deg); }
  100% { transform: scale(1) rotate(0); }
}
.shape-btn.wiggle { animation: shapeWiggle 0.5s cubic-bezier(.34,1.56,.64,1); }

#magic-toggle {
  margin-top: 12px;
  padding: 12px 28px;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #a78bfa, #f472b6);
  color: white; font-size: clamp(16px, 4.5vw, 22px);
  font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 16px rgba(167,139,250,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
#magic-toggle:active { transform: scale(0.93); }
#magic-toggle.on {
  background: linear-gradient(135deg, #f472b6, #fb923c);
  box-shadow: 0 4px 20px rgba(244,114,182,0.5);
}

/* ── Particles ── */
.particle {
  position: fixed;
  pointer-events: none;
  border-radius: 50%;
  z-index: 500;
  animation: particleFly 0.8s ease-out forwards;
  will-change: transform, opacity;
}
@keyframes particleFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}
.star-particle {
  position: fixed;
  pointer-events: none;
  z-index: 500;
  font-size: 22px;
  animation: starFly 0.9s ease-out forwards;
  will-change: transform, opacity;
}
@keyframes starFly {
  0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0) rotate(360deg); opacity: 0; }
}

/* ═══════════════════════════════════════════
   SCREEN 4 — DUCK COLORS
═══════════════════════════════════════════ */
#screen-ducks {
  padding: 8px 8px 4px;
  gap: 0;
}
#duck-title {
  font-size: clamp(22px, 6vw, 34px);
  font-weight: 900;
  color: #f59e0b;
  text-shadow: 0 2px 8px rgba(245,158,11,0.3);
  margin-bottom: 6px;
  direction: rtl;
}
#duck-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: clamp(8px, 2.5vw, 16px);
  width: 100%;
  max-width: 420px;
  padding: 0 6px;
  flex: 1;
  align-content: center;
}
.duck-btn {
  aspect-ratio: 1;
  border: none; cursor: pointer;
  background: transparent;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0;
  border-radius: 20px;
  will-change: transform;
  gap: 4px;
}
.duck-btn svg {
  width: 100%; height: auto;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
}
.duck-label {
  font-size: clamp(13px, 3.8vw, 20px);
  font-weight: 900;
  direction: rtl;
  color: #444;
  line-height: 1;
}
@keyframes duckBounce {
  0%   { transform: scale(1) rotate(0deg); }
  20%  { transform: scale(1.3) rotate(-10deg); }
  45%  { transform: scale(0.9) rotate(8deg); }
  65%  { transform: scale(1.12) rotate(-5deg); }
  85%  { transform: scale(0.97) rotate(2deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.duck-btn.quack { animation: duckBounce 0.65s cubic-bezier(.34,1.56,.64,1); }

/* ═══════════════════════════════════════════
   SCREEN 5 — BATH TIME
═══════════════════════════════════════════ */
#screen-bath {
  padding: 0;
  gap: 0;
  background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
}
#bath-title {
  font-size: clamp(16px, 4.5vw, 24px);
  font-weight: 900;
  color: #0ea5e9;
  text-shadow: 0 2px 8px rgba(14,165,233,0.3);
  padding: 8px 0 4px;
  z-index: 5;
}
#bath-stage {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Shower ── */
#shower-area {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#shower-pipe {
  width: 8px;
  height: 35px;
  background: linear-gradient(90deg, #78716c, #d6d3d1, #a8a29e, #d6d3d1, #78716c);
  border-radius: 4px;
  box-shadow: 1px 1px 3px rgba(0,0,0,0.15);
}
#shower-nozzle {
  width: 56px; height: 18px;
  background: linear-gradient(180deg, #a8a29e, #78716c);
  border-radius: 10px 10px 5px 5px;
  cursor: pointer;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2);
  border-bottom: 2px solid #57534e;
}
#shower-handle { display: none; }
#shower-water {
  display: none;
  width: 50px;
  height: 0;
  position: absolute;
  top: 53px;
  left: 3px;
  overflow: hidden;
}
#shower-water.on {
  display: block;
  height: 250px;
}
.water-stream {
  position: absolute;
  width: 2.5px;
  height: 100%;
  background: linear-gradient(180deg, rgba(56,189,248,0.8), rgba(125,211,252,0.5), rgba(56,189,248,0.15));
  border-radius: 2px;
  animation: streamFall 0.5s linear infinite;
}
.water-stream:nth-child(odd) {
  animation-duration: 0.65s;
}
@keyframes streamFall {
  0% { transform: translateY(-15px) scaleX(1); opacity: 0.8; }
  50% { transform: translateY(5px) scaleX(1.3); opacity: 0.6; }
  100% { transform: translateY(25px) scaleX(0.7); opacity: 0.2; }
}
/* Water splash at bottom of streams */
.water-droplet {
  position: absolute;
  bottom: -4px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(56,189,248,0.5);
  animation: dropletSplash 0.8s ease-out infinite;
}
@keyframes dropletSplash {
  0% { transform: scale(0.5) translateY(0); opacity: 0.7; }
  50% { transform: scale(1.2) translateY(-8px); opacity: 0.4; }
  100% { transform: scale(0.3) translateY(4px); opacity: 0; }
}

/* ── Bathtub ── */
#bathtub {
  position: absolute;
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%);
  width: 82%;
  max-width: 340px;
  height: 38%;
  border-radius: 14px 14px 44px 44px;
  background: linear-gradient(180deg, #fafaf9 0%, #f5f5f4 30%, #e7e5e4 100%);
  border: 4px solid #d6d3d1;
  border-top: 7px solid #e7e5e4;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.14), inset 0 2px 8px rgba(255,255,255,0.6);
}
/* Tub rim highlight */
#bathtub::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  border-radius: 2px;
  z-index: 1;
}
#tub-water {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 72%;
  background: linear-gradient(180deg,
    rgba(125,211,252,0.3) 0%,
    rgba(56,189,248,0.4) 30%,
    rgba(14,165,233,0.55) 70%,
    rgba(2,132,199,0.6) 100%);
  border-radius: 0 0 40px 40px;
  animation: waterWave 3s ease-in-out infinite;
}
@keyframes waterWave {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
/* Water surface shine */
#tub-water::before {
  content: '';
  position: absolute;
  top: 0; left: 5%; right: 5%;
  height: 6px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.5) 20%,
    rgba(255,255,255,0.7) 50%,
    rgba(255,255,255,0.5) 80%,
    transparent 100%);
  border-radius: 3px;
  animation: surfaceShine 4s ease-in-out infinite alternate;
}
@keyframes surfaceShine {
  0% { transform: translateX(-10px); opacity: 0.5; }
  100% { transform: translateX(10px); opacity: 0.9; }
}
#tub-ripples {
  position: absolute;
  top: -2px; left: 0; right: 0;
  height: 10px;
  background: repeating-linear-gradient(
    90deg,
    transparent, transparent 14px,
    rgba(255,255,255,0.5) 14px,
    rgba(255,255,255,0.5) 28px
  );
  animation: rippleMove 2.5s linear infinite;
}
@keyframes rippleMove {
  from { transform: translateX(0); }
  to { transform: translateX(28px); }
}
/* Subtle water bubbles */
.water-bubble {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(255,255,255,0.15));
  border: 1px solid rgba(255,255,255,0.25);
  animation: waterBubbleRise 3s ease-in infinite;
  pointer-events: none;
}
@keyframes waterBubbleRise {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  80% { transform: translateY(-30px) scale(1.1); opacity: 0.3; }
  100% { transform: translateY(-40px) scale(0.5); opacity: 0; }
}

/* ── Bath bear ── */
#bath-bear {
  position: absolute;
  top: 2%;
  left: 3%;
  width: 28%;
  max-width: 130px;
  cursor: grab;
  z-index: 30;
  will-change: transform;
}
#bath-bear svg { width: 100%; height: 100%; display: block; }
#bath-bear.dragging { cursor: grabbing; z-index: 50; }
.dirt-spot {
  position: absolute;
  width: 10px; height: 10px;
  background: radial-gradient(circle, #92400e 40%, #a16207);
  border-radius: 50%;
  opacity: 0.75;
  transition: opacity 0.5s, transform 0.5s;
  pointer-events: none;
}
.dirt-spot.clean {
  opacity: 0;
  transform: scale(0);
}
.foam-spot {
  position: absolute;
  width: 14px; height: 12px;
  background: radial-gradient(circle, white 60%, rgba(255,255,255,0.4));
  border-radius: 50%;
  opacity: 0.85;
  animation: foamPulse 1.5s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 31;
}
@keyframes foamPulse {
  from { transform: scale(1); opacity: 0.85; }
  to { transform: scale(1.2); opacity: 0.6; }
}
#bear-lather {
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 30%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.9) 50%, transparent 75%);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
  z-index: 31;
}
#bear-lather.active { opacity: 1; }

/* ── Tub ducks ── */
#tub-ducks {
  position: absolute;
  bottom: 38%; left: 5%; right: 5%;
  height: 30%;
  z-index: 15;
  pointer-events: none;
}
.tub-duck {
  position: absolute;
  width: 36px;
  cursor: pointer;
  pointer-events: auto;
  animation: duckBob 2s ease-in-out infinite alternate;
  will-change: transform;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
.tub-duck:nth-child(odd) { animation-name: duckBob2; }
.tub-duck:nth-child(3n) { animation-name: duckBob3; }
.tub-duck svg { width: 100%; height: auto; }
@keyframes duckBob {
  0% { transform: translateY(0) rotate(-5deg); }
  30% { transform: translateY(-6px) rotate(2deg); }
  60% { transform: translateY(-3px) rotate(-3deg); }
  100% { transform: translateY(-8px) rotate(5deg); }
}
@keyframes duckBob2 {
  0% { transform: translateY(-2px) rotate(4deg); }
  40% { transform: translateY(-10px) rotate(-3deg); }
  70% { transform: translateY(-5px) rotate(5deg); }
  100% { transform: translateY(0) rotate(-4deg); }
}
@keyframes duckBob3 {
  0% { transform: translateY(-4px) rotate(-3deg) scaleX(1); }
  25% { transform: translateY(-8px) rotate(2deg) scaleX(-1); }
  50% { transform: translateY(-2px) rotate(-4deg) scaleX(-1); }
  75% { transform: translateY(-10px) rotate(3deg) scaleX(1); }
  100% { transform: translateY(-4px) rotate(-3deg) scaleX(1); }
}
#add-duck-btn {
  position: absolute;
  top: 4px; right: 4px;
  border: none;
  background: rgba(255,255,255,0.75);
  border-radius: 50%;
  width: 34px; height: 34px;
  font-size: 16px;
  cursor: pointer;
  z-index: 22;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
#add-duck-btn:active { transform: scale(0.85); }

/* ── Duck picker popup ── */
#duck-picker-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 60;
  align-items: center;
  justify-content: center;
}
#duck-picker-overlay.open { display: flex; }
#duck-picker {
  background: white;
  border-radius: 24px;
  padding: 14px 10px 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 280px;
  width: 85%;
  animation: pickerPop 0.3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pickerPop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#duck-picker-title {
  width: 100%;
  text-align: center;
  font-size: clamp(13px, 3.5vw, 17px);
  font-weight: 900;
  color: #0ea5e9;
  margin-bottom: 4px;
}
#duck-picker-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.duck-pick-btn {
  width: 52px; height: 52px;
  border: 3px solid transparent;
  border-radius: 16px;
  background: #f0f9ff;
  cursor: pointer;
  padding: 4px;

<script>
'use strict';
// ─────────────────────────────────────────────
// AUDIO ENGINE — Tone.js
// ─────────────────────────────────────────────
let muted = false;
let toneReady = false;

// Called synchronously on first user gesture — required by browsers
let bathAudioPrimed = false;
function unlockAudio() {
  if (!toneReady) {
    toneReady = true;
    Tone.start().catch(() => {});
    // iOS requires speech synthesis to be primed on first user gesture too
    if (window.speechSynthesis) {
      const primer = new SpeechSynthesisUtterance('');
      primer.volume = 0;
      window.speechSynthesis.speak(primer);
    }
  }
  // iOS: each Audio element must be play()-ed during a user gesture to unlock
  if (!bathAudioPrimed && typeof bathAudio !== 'undefined') {
    bathAudioPrimed = true;
    Object.values(bathAudio).forEach(a => {
      a.muted = true;
      a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; }).catch(() => { a.muted = false; });
    });
  }
}

// ── Shared effects ──
const limiter = new Tone.Limiter(-3).toDestination();
const reverb  = new Tone.Reverb({ decay: 1.2, wet: 0.18 }).connect(limiter);

// ── Piano sampler (music screen) ──
// Uses free Salamander piano samples from Tone.js examples (CORS-enabled)
const piano = new Tone.Sampler({
  urls: { C4:'C4.mp3', D4:'D4.mp3', E4:'E4.mp3', G4:'G4.mp3', A4:'A4.mp3', C5:'C5.mp3' },
  baseUrl: 'https://tonejs.github.io/audio/salamander/',
  release: 2,
}).connect(reverb);

const NOTE_NAMES = ['C4','D4','E4','G4','A4','C5'];
// Keep Hz array for backwards compat
const NOTES = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];

function playPianoNote(noteIdx) {
  if (muted) return;
  try {
    if (piano.loaded) {
      piano.triggerAttackRelease(NOTE_NAMES[noteIdx], '8n');
    } else {
      // fallback: bell synth while samples load
      bellSynth.triggerAttackRelease(NOTES[noteIdx], '8n');
    }
  } catch(e) {}
}

// Fallback bell synth (used until piano samples finish loading)
const bellSynth = new Tone.PolySynth(Tone.Synth, {
  oscillator: { type: 'triangle' },
  envelope: { attack: 0.001, decay: 0.4, sustain: 0.1, release: 1.5 },
  volume: -8,
}).connect(reverb);

// ── Pop sound (bubbles) ──
const noisePop = new Tone.NoiseSynth({
  noise: { type: 'white' },
  envelope: { attack: 0.001, decay: 0.08, sustain: 0, release: 0.05 },
  volume: -4,
}).connect(limiter);

function playPop() {
  if (muted) return;
  try { noisePop.triggerAttackRelease('16n'); } catch(e) {}
}

// ── Animal synths ──
const catSynth = new Tone.FMSynth({
  harmonicity: 3, modulationIndex: 10,
  oscillator: { type: 'sine' },
  envelope: { attack: 0.02, decay: 0.3, sustain: 0.1, release: 0.4 },
  modulation: { type: 'sine' },
  modulationEnvelope: { attack: 0.2, decay: 0.3, sustain: 0.2, release: 0.5 },
  volume: -6,
}).connect(limiter);

const dogSynth = new Tone.AMSynth({
  harmonicity: 1.5,
  oscillator: { type: 'sawtooth' },
  envelope: { attack: 0.001, decay: 0.12, sustain: 0.05, release: 0.15 },
  modulation: { type: 'sawtooth' },
  modulationEnvelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 },
  volume: -4,
}).connect(limiter);

const mooSynth = new Tone.FMSynth({
  harmonicity: 1, modulationIndex: 3,
  oscillator: { type: 'sawtooth' },
  envelope: { attack: 0.1, decay: 0.4, sustain: 0.6, release: 0.5 },
  volume: -4,
}).connect(limiter);

const chirpSynth = new Tone.Synth({
  oscillator: { type: 'sine' },
  envelope: { attack: 0.001, decay: 0.1, sustain: 0.05, release: 0.2 },
  volume: -6,
}).connect(reverb);

const deepSynth = new Tone.Synth({
  oscillator: { type: 'sawtooth' },
  envelope: { attack: 0.05, decay: 0.6, sustain: 0.3, release: 0.4 },
  volume: -2,
}).connect(limiter);

function playAnimalSound(name) {
  if (muted) return;
  const now = Tone.now();
  try {
    switch(name) {
      case 'cat':
        catSynth.triggerAttackRelease('A4', '8n', now);
        catSynth.triggerAttackRelease('G4', '8n', now + 0.35);
        break;
      case 'dog':
        dogSynth.triggerAttackRelease('G2', '16n', now);
        dogSynth.triggerAttackRelease('F2', '16n', now + 0.18);
        dogSynth.triggerAttackRelease('G2', '16n', now + 0.36);
        break;
      case 'duck':
        chirpSynth.triggerAttackRelease('B4', '16n', now);
        chirpSynth.triggerAttackRelease('A4', '16n', now + 0.16);
        chirpSynth.triggerAttackRelease('B4', '16n', now + 0.32);
        break;
      case 'cow':
        mooSynth.triggerAttackRelease('C2', '2n', now);
        break;
      case 'elephant':
        deepSynth.triggerAttackRelease('C1', '4n', now);
        deepSynth.triggerAttackRelease('B0', '4n', now + 0.5);
        break;
      case 'lion':
        deepSynth.triggerAttackRelease('G1', '4n', now);
        deepSynth.triggerAttackRelease('E1', '4n', now + 0.3);
        deepSynth.triggerAttackRelease('C1', '4n', now + 0.6);
        break;
      case 'frog':
        chirpSynth.triggerAttackRelease('D4', '16n', now);
        chirpSynth.triggerAttackRelease('Bb3', '16n', now + 0.2);
        break;
      case 'bunny':
        chirpSynth.triggerAttackRelease('E5', '32n', now);
        chirpSynth.triggerAttackRelease('G5', '32n', now + 0.15);
        break;
      case 'butterfly':
      case 'fish':
      default:
        ['C5','E5','G5','C6'].forEach((n,i) =>
          bellSynth.triggerAttackRelease(n, '8n', now + i * 0.12));
    }
  } catch(e) {}
}

// ── Duck quack (duck colors screen) ──
function playDuckQuack() {
  if (muted) return;
  const now = Tone.now();
  try {
    chirpSynth.triggerAttackRelease('B4', '16n', now);
    chirpSynth.triggerAttackRelease('A4', '16n', now + 0.17);
    chirpSynth.triggerAttackRelease('B4', '16n', now + 0.34);
  } catch(e) {}
}

// ── Chime (kept for compatibility) ──
function playChime(freq) {
  if (muted) return;
  const idx = NOTES.findIndex(n => Math.abs(n - freq) < 1);
  playPianoNote(idx >= 0 ? idx : 0);
}

// ─────────────────────────────────────────────
// SPEECH
// ─────────────────────────────────────────────
function speak(text) {
  if (muted || !window.speechSynthesis) return;
  // Do NOT call cancel() before speak on iOS — it silently breaks the engine.
  // Instead just speak; utterances are short so overlap is fine for a toddler.
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85; u.pitch = 1.3; u.volume = 1;
  speechSynthesis.speak(u);
}

function speakArabic(text) {

const screens = ['screen-animals','screen-bubbles','screen-music','screen-ducks','screen-bath','screen-tooth'];
let currentScreen = 0;
let isAnimating = false;

function goTo(idx) {
  if (isAnimating || idx === currentScreen) return;
  isAnimating = true;
  const dir = idx > currentScreen ? 1 : -1;
  const from = document.getElementById(screens[currentScreen]);
  const to   = document.getElementById(screens[idx]);

  to.classList.remove('left','right','active');
  to.classList.add(dir > 0 ? 'right' : 'left');
  to.getBoundingClientRect(); // force reflow

  from.classList.add(dir > 0 ? 'left' : 'right');
  from.classList.remove('active');
  to.classList.remove('left','right');
  to.classList.add('active');

  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === idx));
  currentScreen = idx;

  if (idx === 1) initBubbles();
  if (idx === 2) initMusic();
  if (idx === 3) initDucks();
  if (idx === 4) initBath();
  if (idx === 5) initToothBrush();

  setTimeout(() => { isAnimating = false; }, 450);
}

document.getElementById('prev-btn').addEventListener('pointerdown', e => { e.preventDefault(); goTo(Math.max(0, currentScreen-1)); });
document.getElementById('next-btn').addEventListener('pointerdown', e => { e.preventDefault(); goTo(Math.min(screens.length-1, currentScreen+1)); });

let swipeStartX = 0, swipeStartY = 0, swipeValid = false;
document.getElementById('screens').addEventListener('pointerdown', e => {
  // Don't start swipe if interacting with bath draggables or popups
  if (activeDrag) { swipeValid = false; return; }
  if (e.target.closest('#bath-tools, #bath-bear, #shower-area, #duck-picker-overlay, #add-duck-btn, .tub-duck, #tooth-tools, .tooth-tool')) { swipeValid = false; return; }
  swipeStartX = e.clientX; swipeStartY = e.clientY;
  swipeValid = true;
}, { passive: true });
document.getElementById('screens').addEventListener('pointerup', e => {
  if (!swipeValid || activeDrag) return;
  swipeValid = false;
  const dx = e.clientX - swipeStartX;
  const dy = e.clientY - swipeStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    goTo(dx < 0 ? Math.min(screens.length-1, currentScreen+1) : Math.max(0, currentScreen-1));

}, { passive: true });

// DRAG & DROP SYSTEM
// ─────────────────────────────────────────────
let activeDrag = null;
function makeDraggable(el, opts = {}) {
  let isDragging = false;
  let offsetX, offsetY, origParent, origNextSibling;

  function onDown(e) {
    e.preventDefault();
    e.stopPropagation();
    unlockAudio();
    isDragging = true;
    activeDrag = el;
    const rect = el.getBoundingClientRect();
    const stage = document.getElementById('bath-stage');
    const stageRect = stage.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    // Save original parent for reparenting back on drop
    origParent = el.parentNode;
    origNextSibling = el.nextSibling;

    el.classList.add('dragging');
    // Position absolute within bath-stage
    el.style.position = 'absolute';
    el.style.left = (rect.left - stageRect.left) + 'px';
    el.style.top = (rect.top - stageRect.top) + 'px';
    el.style.width = rect.width + 'px';
    el.style.zIndex = '100';
    // Reparent to bath-stage if not already there (fixes z-index stacking)
    if (origParent !== stage) {
      stage.appendChild(el);
    }

    if (opts.onStart) opts.onStart(el, { x: e.clientX, y: e.clientY });
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const stage = document.getElementById('bath-stage');
    const stageRect = stage.getBoundingClientRect();
    el.style.left = (e.clientX - offsetX - stageRect.left) + 'px';
    el.style.top = (e.clientY - offsetY - stageRect.top) + 'px';
    if (opts.onMove) opts.onMove(el, { x: e.clientX, y: e.clientY });
  }

  function onUp(e) {
    if (!isDragging) return;
    isDragging = false;
    activeDrag = null;
    el.classList.remove('dragging');
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
    const pos = e.clientX ? { x: e.clientX, y: e.clientY } : { x: 0, y: 0 };
    if (opts.onEnd) opts.onEnd(el, pos, origParent, origNextSibling);
  }

  el.addEventListener('pointerdown', onDown);
  el.style.touchAction = 'none';
}

function reparentBack(el, origParent, origNextSibling) {
  el.style.position = '';
  el.style.left = '';
  el.style.top = '';
  el.style.width = '';
  el.style.zIndex = '';
  el.style.transition = '';
  if (origParent) {
    if (origNextSibling && origNextSibling.parentNode === origParent) {
      origParent.insertBefore(el, origNextSibling);
    } else {
      origParent.appendChild(el);
    }
  }
}

function playBathSound(key) {
  if (muted) return;
  const a = bathAudio[key];
  if (!a) return;
  // For non-looping sounds, reset and play
  if (!a.loop) {
    a.currentTime = 0;
  }
  a.play().catch(() => {});
}

function stopBathSound(key) {
  const a = bathAudio[key];
  if (!a) return;
  a.pause();
  a.currentTime = 0;
}

function playSplash() { playBathSound('splash'); }
function playScrub() { playBathSound('scrub'); }
function playSqueak() { playBathSound('soap'); }
function playLaugh() {
  if (muted) return;
  const key = Math.random() > 0.5 ? 'laugh1' : 'laugh2';
  playBathSound(key);
}
function playCelebration() { playBathSound('celebrate'); }

function startShowerSound() { playBathSound('shower'); }
function stopShowerSound() { stopBathSound('shower'); }
function playDrySound() { playBathSound('dry'); }

// ── Helpers ──
function isOverElement(pos, elId) {
  const el = document.getElementById(elId);
  if (!el) return false;
  const r = el.getBoundingClientRect();
  return pos.x >= r.left && pos.x <= r.right && pos.y >= r.top && pos.y <= r.bottom;
}

function isOverBear(pos) {
  const el = document.getElementById('bath-bear');
  if (!el) return false;
  const r = el.getBoundingClientRect();
  return pos.x >= r.left && pos.x <= r.right && pos.y >= r.top && pos.y <= r.bottom;
}

function createSplash(parentEl, x, y) {
  for (let i = 0; i < 3; i++) {
    const ring = document.createElement('div');
    ring.className = 'splash-ring';
    ring.style.left = (x - 25 + (Math.random()-0.5)*20) + 'px';
    ring.style.top = (y - 12 + (Math.random()-0.5)*10) + 'px';
    ring.style.animationDelay = (i * 0.12) + 's';
    parentEl.appendChild(ring);
    setTimeout(() => ring.remove(), 700);
  }
}

function spawnBubbles(x, y, count = 8) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 5 + Math.random() * 10;
    const angle = Math.random() * Math.PI * 2;
    const dist = 15 + Math.random() * 35;
    el.style.cssText = `
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(56,189,248,0.3);
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }
}

// ── Tub duck spawning + dragging ──
function spawnTubDuck(palIdx) {
  if (bathState.duckCount >= bathState.maxDucks) return;
  const container = document.getElementById('tub-ducks');
  const pal = bathDuckPalette[palIdx != null ? palIdx : bathState.duckCount % bathDuckPalette.length];
  const duck = document.createElement('div');
  duck.className = 'tub-duck';
  duck.innerHTML = duckSVG(pal.body, pal.dark);
  duck.style.left = (5 + Math.random() * 60) + '%';
  duck.style.bottom = (20 + Math.random() * 50) + '%';
  duck.style.animationDelay = (-Math.random() * 2.2) + 's';
  duck.style.animationDuration = (1.8 + Math.random() * 1) + 's';

  // Duck drag state
  let duckDragging = false, duckOffX, duckOffY, duckMoved = false;

  duck.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    unlockAudio();
    duckDragging = true;
    duckMoved = false;
    activeDrag = duck;
    const r = duck.getBoundingClientRect();
    duckOffX = e.clientX - r.left;
    duckOffY = e.clientY - r.top;
    // Pause bobbing animation
    duck.style.animation = 'none';

    function duckMove(ev) {
      if (!duckDragging) return;
      ev.preventDefault();
      duckMoved = true;
      // Constrain to tub
      const tub = document.getElementById('bathtub').getBoundingClientRect();
      const cont = container.getBoundingClientRect();
      let x = ev.clientX - duckOffX - cont.left;
      let y = ev.clientY - duckOffY - cont.top;
      // Clamp
      x = Math.max(0, Math.min(cont.width - 36, x));
      y = Math.max(0, Math.min(cont.height - 30, y));
      duck.style.left = x + 'px';
      duck.style.bottom = 'auto';
      duck.style.top = y + 'px';
    }

    function duckUp(ev) {
      duckDragging = false;
      activeDrag = null;
      document.removeEventListener('pointermove', duckMove);
      document.removeEventListener('pointerup', duckUp);
      document.removeEventListener('pointercancel', duckUp);
      // Restore bobbing with new delay
      duck.style.animation = '';
      duck.style.animationDelay = (-Math.random() * 2.2) + 's';
      // If just a tap (no drag), quack
      if (!duckMoved) {
        playDuckQuack();
        const r2 = duck.getBoundingClientRect();
        spawnParticles(r2.left + r2.width/2, r2.top + r2.height/2, 6);
      }
    }

    document.addEventListener('pointermove', duckMove);
    document.addEventListener('pointerup', duckUp);
    document.addEventListener('pointercancel', duckUp);
  });

  container.appendChild(duck);
  bathState.duckCount++;
}

// ── Duck picker popup ──

  if (bathState.duckCount >= bathState.maxDucks) return;
  const overlay = document.getElementById('duck-picker-overlay');
  const grid = document.getElementById('duck-picker-grid');
  grid.innerHTML = '';

  bathDuckPalette.forEach((pal, i) => {
    const btn = document.createElement('button');
    btn.className = 'duck-pick-btn';

    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();

  overlay.classList.add('open');
}

// ── Apply tool to bear ──
let lastToolApply = 0;
function applyToolToBear(toolName, pos) {
  const now = Date.now();
  if (now - lastToolApply < 250) return;
  lastToolApply = now;

  switch (toolName) {
    case 'sponge': {
      const remaining = document.querySelectorAll('#bath-bear .dirt-spot:not(.clean)');
      if (remaining.length > 0) {
        remaining[0].classList.add('clean');
        bathState.cleaned++;
      }
      playScrub();
      spawnBubbles(pos.x, pos.y, 6);
      bathState.spokeTool.sponge = true;
      break;
    }
    case 'soap': {
      bathState.soapApplied = true;
      playSqueak();
      // Add foam spots on bear
      const bear = document.getElementById('bath-bear');
      const bRect = bear.getBoundingClientRect();
      const stage = document.getElementById('bath-stage').getBoundingClientRect();
      for (let i = 0; i < 2; i++) {
        const foam = document.createElement('div');
        foam.className = 'foam-spot';
        foam.style.left = (pos.x - stage.left - 7 + (Math.random()-0.5)*20) + 'px';
        foam.style.top = (pos.y - stage.top - 6 + (Math.random()-0.5)*20) + 'px';
        document.getElementById('bath-stage').appendChild(foam);
      }
      spawnBubbles(pos.x, pos.y, 5);
      bathState.spokeTool.soap = true;
      break;
    }
    case 'shampoo': {
      bathState.shampooApplied = true;
      playSqueak();
      document.getElementById('bear-lather').classList.add('active');
      spawnBubbles(pos.x, pos.y, 8);
      bathState.spokeTool.shampoo = true;
      break;
    }
  }
}

// ── Joyful bath sounds ──
let joyInterval = null;
function startJoyfulSpeech() {
  if (joyInterval) return;
  // First laugh after splash
  setTimeout(() => playLaugh(), 1200);
  // Then every 6-8 seconds
  joyInterval = setInterval(() => {
    if (!bathState.bearInTub || muted) return;
    playLaugh();
    // Occasional extra splash
    if (Math.random() > 0.5) {
      const bear = document.getElementById('bath-bear');
      const r = bear.getBoundingClientRect();
      spawnParticles(r.left + r.width/2, r.top + r.height/2, 6);
      playSplash();
    }
  }, 6000 + Math.random() * 2000);
}
function stopJoyfulSpeech() {
  clearInterval(joyInterval);
  joyInterval = null;
}

// ── Drop bear into tub ──
function dropBearInTub() {
  bathState.bearInTub = true;
  const bear = document.getElementById('bath-bear');
  const tub = document.getElementById('bathtub');
  const stage = document.getElementById('bath-stage');
  const tubRect = tub.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();

  // Position bear in tub center
  bear.style.left = (tubRect.left - stageRect.left + tubRect.width * 0.3) + 'px';
  bear.style.top = (tubRect.top - stageRect.top + tubRect.height * 0.05) + 'px';

  // Add playful animation
  bear.classList.add('in-tub');

  // Splash!
  createSplash(stage, tubRect.width * 0.45, tubRect.top - stageRect.top + 20);
  playSplash();

  const cx = tubRect.left + tubRect.width / 2;
  const cy = tubRect.top + 20;
  spawnParticles(cx, cy, 14);

  // Start joyful speech and water bubbles
  startJoyfulSpeech();
  startTubBubbles();
}

// ── Toggle shower ──
function toggleShower(e) {
  e.preventDefault();
  e.stopPropagation();
  unlockAudio();
  bathState.showerOn = !bathState.showerOn;
  document.getElementById('shower-water').classList.toggle('on', bathState.showerOn);
  document.getElementById('shower-handle').classList.toggle('on', bathState.showerOn);
  if (bathState.showerOn) {
    startShowerSound();
    // Rinse away soap foam and shampoo lather after 2s
    setTimeout(() => {
      if (!bathState.showerOn) return;
      const hadSoap = bathState.soapApplied;
      const hadShampoo = bathState.shampooApplied;
      document.querySelectorAll('#bath-stage .foam-spot').forEach(f => {
        f.style.transition = 'opacity 0.8s';
        f.style.opacity = '0';
        setTimeout(() => f.remove(), 900);
      });
      const lather = document.getElementById('bear-lather');
      if (lather) lather.classList.remove('active');
      bathState.soapApplied = false;
      bathState.shampooApplied = false;
      if (hadSoap || hadShampoo) {
        playSplash();
      }
    }, 2000);
  } else {
    stopShowerSound();
  }
}

// ── Towel tap ──
function onTowelTap(e) {
  e.preventDefault();
  e.stopPropagation();
  unlockAudio();
  if (!bathState.bearInTub) return;

  const bear = document.getElementById('bath-bear');
  bear.classList.remove('in-tub');
  bear.classList.add('drying');
  stopJoyfulSpeech();
  stopTubBubbles();
  playDrySound();

  // Add towel wrap
  const towel = document.createElement('div');
  towel.className = 'towel-wrap';
  bear.appendChild(towel);

  // Sparkle
  const sparkle = document.createElement('div');
  sparkle.className = 'bear-sparkle';
  sparkle.textContent = '✨';
  bear.appendChild(sparkle);

  playCelebration();

  const rect = bear.getBoundingClientRect();
  spawnStars(rect.left + rect.width/2, rect.top + rect.height/2, 10);

  // Turn off shower
  if (bathState.showerOn) {
    bathState.showerOn = false;
    document.getElementById('shower-water').classList.remove('on');
    document.getElementById('shower-handle').classList.remove('on');
    stopShowerSound();
  }

  setTimeout(resetBath, 3000);
}

// ── Reset bath ──
function resetBath() {
  const bear = document.getElementById('bath-bear');
  bear.classList.remove('drying', 'in-tub');

  // Stop all bath sounds
  stopJoyfulSpeech();
  stopTubBubbles();
  stopShowerSound();
  stopBathSound('dry');
  stopBathSound('celebrate');

  // Remove towel and sparkle
  bear.querySelectorAll('.towel-wrap, .bear-sparkle').forEach(e => e.remove());

  // Restore bear position
  bear.style.position = 'absolute';
  bear.style.width = '';
  bear.style.zIndex = '';
  bear.style.left = bathState.bearOrigLeft;
  bear.style.top = bathState.bearOrigTop;

  // Restore dirt spots
  bear.querySelectorAll('.dirt-spot').forEach(s => s.classList.remove('clean'));

  // Remove foam spots and water bubbles
  document.querySelectorAll('#bath-stage .foam-spot').forEach(f => f.remove());
  document.querySelectorAll('#tub-water .water-bubble').forEach(b => b.remove());

  // Remove lather
  const lather = document.getElementById('bear-lather');

// ── Init bath ──
function initBath() {
  if (bathInitialized) return;
  bathInitialized = true;

  const bear = document.getElementById('bath-bear');
  const stage = document.getElementById('bath-stage');

  // Inject bear SVG + dirt spots + lather
  bear.innerHTML = bearSVG() +
    '<div class="dirt-spot" style="top:52%;left:32%"></div>' +
    '<div class="dirt-spot" style="top:58%;left:58%"></div>' +
    '<div class="dirt-spot" style="top:68%;left:28%"></div>' +
    '<div class="dirt-spot" style="top:48%;left:62%"></div>' +
    '<div class="dirt-spot" style="top:42%;left:18%"></div>' +
    '<div class="dirt-spot" style="top:62%;left:48%"></div>' +
    '<div id="bear-lather"></div>';

  // Inject tool SVGs
  document.querySelectorAll('#bath-tools .bath-tool').forEach(tool => {
    const type = tool.dataset.tool;
    if (bathToolSVGs[type]) {
      tool.querySelector('.tool-icon').innerHTML = bathToolSVGs[type]();
    }
  });

  // Create shower streams
  createShowerStreams();

  // Spawn initial ducks
  for (let i = 0; i < 2; i++) spawnTubDuck();

  // Shower toggle
  document.getElementById('shower-handle').addEventListener('pointerdown', toggleShower);
  document.getElementById('shower-nozzle').addEventListener('pointerdown', toggleShower);

  // Add duck button — opens color picker
  document.getElementById('add-duck-btn').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    unlockAudio();
    openDuckPicker();
  });

  // Duck picker close button and overlay dismiss
  document.getElementById('duck-picker-close').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    closeDuckPicker();
  });
  document.getElementById('duck-picker-overlay').addEventListener('pointerdown', (e) => {
    if (e.target === e.currentTarget) {
      e.preventDefault();
      closeDuckPicker();
    }
  });

  // Make bear draggable
  makeDraggable(bear, {
    onEnd: (el, pos, origParent, origNextSibling) => {
      el.style.width = '';
      el.style.zIndex = '';
      if (!bathState.bearInTub && isOverElement(pos, 'bathtub')) {
        dropBearInTub();
      } else if (!bathState.bearInTub) {
        el.style.left = bathState.bearOrigLeft;
        el.style.top = bathState.bearOrigTop;
      }
    }
  });

  // Make sponge, soap, shampoo draggable
  ['sponge','soap','shampoo'].forEach(toolName => {
    const toolEl = document.querySelector(`#bath-tools .bath-tool[data-tool="${toolName}"]`);

    makeDraggable(toolEl, {
      onMove: (el, pos) => {
        if (bathState.bearInTub && isOverBear(pos)) {
          applyToolToBear(toolName, pos);
        }
      },
      onEnd: (el, pos, origParent, origNextSibling) => {
        // Reparent back to tool shelf
        reparentBack(el, origParent, origNextSibling);
      }
    });
  });

  // Towel: tap only
  document.querySelector('#bath-tools .bath-tool[data-tool="towel"]').addEventListener('pointerdown', onTowelTap);
}

// ── Get teeth color based on cleanliness ──
function getTeethColor() {
  const p = toothState.cleanProgress;
  // Interpolate from dirty yellow (#c4a832) to sparkling white (#ffffff)
  const r = Math.round(196 + (255 - 196) * p / 100);
  const g = Math.round(168 + (255 - 168) * p / 100);
  const b = Math.round(50 + (255 - 50) * p / 100);
  return `rgb(${r},${g},${b})`;
}

// ── Tooth drag system (similar to bath but for tooth-stage) ──
let activeToothDrag = null;
function makeToothDraggable(el, opts = {}) {
  let isDragging = false;
  let offsetX, offsetY, origParent, origNextSibling;

  function onDown(e) {
    if (opts.canDrag && !opts.canDrag()) return;
    e.preventDefault();
    e.stopPropagation();
    unlockAudio();
    isDragging = true;
    activeToothDrag = el;
    activeDrag = el;
    const rect = el.getBoundingClientRect();
    const stage = document.getElementById('tooth-stage');
    const stageRect = stage.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    origParent = el.parentNode;
    origNextSibling = el.nextSibling;
    el.classList.add('dragging');
    el.style.position = 'absolute';
    el.style.left = (rect.left - stageRect.left) + 'px';
    el.style.top = (rect.top - stageRect.top) + 'px';
    el.style.width = rect.width + 'px';
    el.style.zIndex = '100';
    if (origParent !== stage) stage.appendChild(el);
    if (opts.onStart) opts.onStart(el, { x: e.clientX, y: e.clientY });
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  }

  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    const stage = document.getElementById('tooth-stage');
    const stageRect = stage.getBoundingClientRect();
    el.style.left = (e.clientX - offsetX - stageRect.left) + 'px';
    el.style.top = (e.clientY - offsetY - stageRect.top) + 'px';
    if (opts.onMove) opts.onMove(el, { x: e.clientX, y: e.clientY });
  }

  function onUp(e) {
    if (!isDragging) return;
    isDragging = false;
    activeToothDrag = null;
    activeDrag = null;
    el.classList.remove('dragging');
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
    const pos = e.clientX ? { x: e.clientX, y: e.clientY } : { x: 0, y: 0 };
    if (opts.onEnd) opts.onEnd(el, pos, origParent, origNextSibling);
  }

  el.addEventListener('pointerdown', onDown);
  el.style.touchAction = 'none';
}

function toothReparentBack(el, origParent, origNextSibling) {
  el.style.position = '';
  el.style.left = '';
  el.style.top = '';
  el.style.width = '';
  el.style.zIndex = '';
  el.style.transition = '';
  if (origParent) {
    if (origNextSibling && origNextSibling.parentNode === origParent) {
      origParent.insertBefore(el, origNextSibling);
    } else {
      origParent.appendChild(el);
    }
  }
}

// ── Check if point overlaps element ──
function isOverElement(pos, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return false;
  const r = el.getBoundingClientRect();
  return pos.x >= r.left && pos.x <= r.right && pos.y >= r.top && pos.y <= r.bottom;
}

// ── Check overlap with the rabbit's mouth area ──
function isOverMouth(pos) {
  const rabbit = document.getElementById('tooth-rabbit');
  if (!rabbit) return false;
  const r = rabbit.getBoundingClientRect();
  // Mouth is roughly in the center, at about 50-60% height of the rabbit
  const mouthCX = r.left + r.width * 0.5;
  const mouthCY = r.top + r.height * 0.54;
  const mouthW = r.width * 0.32;
  const mouthH = r.height * 0.12;
  return Math.abs(pos.x - mouthCX) < mouthW && Math.abs(pos.y - mouthCY) < mouthH;
}

// ── Reset game ──
function resetToothGame() {
  toothState.phase = 'paste';
  toothState.pasteApplied = false;
  toothState.cleanProgress = 0;
  toothState.strokeCount = 0;
  toothState.brushing = false;

  // Reset visuals
  updateRabbit();
  updateToothProgress();

  const hint = document.getElementById('tooth-hint');
  hint.textContent = '👆 Drag toothpaste to the brush!';
  hint.classList.remove('hidden');

  const celeb = document.getElementById('tooth-celebrate');
  celeb.classList.remove('show');

  // Reset tools
  const pasteTool = document.querySelector('.tooth-tool[data-tool="paste"]');
  const brushTool = document.querySelector('.tooth-tool[data-tool="brush"]');
  pasteTool.classList.remove('used');
  brushTool.classList.remove('used');

  // Re-render brush without paste
  document.getElementById('brush-icon').innerHTML = toothbrushSVG(false);
}

// ── Init ──
function initToothBrush() {
  if (toothInitialized) return;
  toothInitialized = true;

  // Render rabbit
  const rabbitEl = document.getElementById('tooth-rabbit');
  rabbitEl.innerHTML = rabbitSVG(getTeethColor());

  // Render tools
  document.getElementById('paste-icon').innerHTML = toothpasteSVG();
  document.getElementById('brush-icon').innerHTML = toothbrushSVG(false);

  const pasteTool = document.querySelector('.tooth-tool[data-tool="paste"]');
  const brushTool = document.querySelector('.tooth-tool[data-tool="brush"]');

  // ── Phase 1: Drag toothpaste to brush ──
  makeToothDraggable(pasteTool, {
    canDrag: () => toothState.phase === 'paste',
    onEnd: (el, pos, origParent, origNextSibling) => {
      // Check if dropped on brush
      const brushRect = brushTool.getBoundingClientRect();
      const overBrush = pos.x >= brushRect.left && pos.x <= brushRect.right &&
                        pos.y >= brushRect.top && pos.y <= brushRect.bottom;

      if (overBrush && toothState.phase === 'paste') {
        // Apply paste!
        toothState.pasteApplied = true;
        toothState.phase = 'brush';
        playPasteSquirt();

        // Update brush to show paste
        document.getElementById('brush-icon').innerHTML = toothbrushSVG(true);

        // Mark paste as used
        pasteTool.classList.add('used');

        // Update hint
        const hint = document.getElementById('tooth-hint');
        hint.textContent = '🪥 Now drag the brush to the teeth!';

        spawnParticles(
          brushRect.left + brushRect.width / 2,
          brushRect.top + brushRect.height / 2,
          8
        );
      }

      // Return paste to shelf
      toothReparentBack(el, origParent, origNextSibling);
    }
  });

  // ── Phase 2: Drag brush to mouth for cleaning ──
  let brushMoveCounter = 0;
  makeToothDraggable(brushTool, {
    canDrag: () => toothState.phase === 'brush',
    onMove: (el, pos) => {
      if (toothState.phase !== 'brush') return;
      if (isOverMouth(pos)) {
        brushMoveCounter++;
        // Every few move events = one stroke
        if (brushMoveCounter % 3 === 0) {
          toothState.strokeCount++;
          const progress = Math.min(100, (toothState.strokeCount / toothState.totalStrokes) * 100);
          toothState.cleanProgress = progress;

          updateRabbit();
          updateToothProgress();
          playBrushSound();
          spawnToothFoam(pos.x, pos.y);

          // Sparkle at higher cleanliness
          if (progress > 40 && Math.random() > 0.5) {
            spawnToothSparkle(pos.x, pos.y);
          }

          // Check completion
          if (progress >= 100 && toothState.phase === 'brush') {
            toothState.phase = 'done';
            // Return brush and celebrate
            setTimeout(() => {
              celebrateTooth();
            }, 300);
          }
        }
      }
    },
    onEnd: (el, pos, origParent, origNextSibling) => {
      brushMoveCounter = 0;
      toothReparentBack(el, origParent, origNextSibling);
    }
  });

  // ── Replay button ──
  document.getElementById('tooth-replay-btn').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    resetToothGame();
  });
}

function celebrateTooth() {
  const hint = document.getElementById('tooth-hint');
  hint.classList.add('hidden');

  playSparkleSound();
  playCelebrationSound();

  // Sparkle burst around rabbit
  const rabbit = document.getElementById('tooth-rabbit');
  const r = rabbit.getBoundingClientRect();
  for (let i = 0; i < 15; i++) {
    setTimeout(() => {
      spawnToothSparkle(
        r.left + Math.random() * r.width,
        r.top + Math.random() * r.height
      );
      spawnParticles(
        r.left + Math.random() * r.width,
        r.top + Math.random() * r.height * 0.7,
        3
      );
    }, i * 80);
  }

  // Show celebration after sparkles
  setTimeout(() => {
    const celeb = document.getElementById('tooth-celebrate');
    celeb.classList.add('show');
  }, 800);
}

// ─────────────────────────────────────────────
// PREVENT BROWSER DEFAULTS
// ─────────────────────────────────────────────
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());

// Prevent pull-to-refresh
document.body.style.overscrollBehavior = 'none';
document.documentElement.style.overscrollBehavior = 'none';

// Unlock audio on first touch — synchronous, capture phase fires before everything else
// Keep firing until both Tone.js and bath audio are primed (iOS needs user gesture for each Audio)
document.addEventListener('pointerdown', function primeTap() {
  unlockAudio();
  if (toneReady && bathAudioPrimed) {
    document.removeEventListener('pointerdown', primeTap, true);
  }
}, { capture: true, passive: true });

// ─────────────────────────────────────────────
// SERVICE WORKER
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
